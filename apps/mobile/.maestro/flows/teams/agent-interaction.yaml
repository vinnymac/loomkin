appId: com.loomkin.mobile
name: "Teams: Agent interaction and messaging"
tags:
  - teams
  - agents

---
# Authenticate first
- runFlow: ../../utils/setup-auth.yaml

# Navigate to teams tab
- tapOn:
    id: "tabs-teams-button"

# Wait for teams screen
- extendedWaitUntil:
    visible:
      id: "teams-screen"
    timeout: 5000

# If a team exists (seeded), tap on it; otherwise the test ends gracefully
# The seeded team is linked to a session, so it should appear
# For now, verify the team composer elements exist after navigating to a team

# Verify teams screen loads (may show empty state if no team is linked to the index)
- extendedWaitUntil:
    visible:
      id: "teams-screen"
    timeout: 5000

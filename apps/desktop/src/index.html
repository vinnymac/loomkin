<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Loomkin</title>
    <style>
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      #app {
        text-align: center;
      }
      .spinner {
        width: 40px;
        height: 40px;
        margin: 0 auto 16px;
        border: 3px solid #334155;
        border-top-color: #818cf8;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      p {
        font-size: 14px;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="spinner"></div>
      <p>Connecting to Loomkin server...</p>
    </div>
    <script type="module" src="main.ts"></script>
  </body>
</html>

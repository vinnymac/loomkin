appId: com.loomkin.mobile
name: "Sessions: Create a new session"
tags:
  - sessions
  - smoke

---
# Authenticate first
- runFlow: ../../utils/setup-auth.yaml

# Navigate to sessions tab
- tapOn:
    id: "tabs-sessions-button"

# Wait for sessions screen
- extendedWaitUntil:
    visible:
      id: "sessions-screen"
    timeout: 5000

# Tap the new session FAB button
- tapOn:
    id: "sessions-new-session-button"

# Wait for the new session modal to appear
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "new-session-project-path-input"
    timeout: 5000

# Enter a project path (required field)
- tapOn:
    id: "new-session-project-path-input"
- eraseText:
    charactersToErase: 50
- inputText: "/tmp/e2e-create-test"

# Hide keyboard before tapping create
- hideKeyboard
- waitForAnimationToEnd

# Tap create (model defaults to anthropic:claude-sonnet if none selected)
- tapOn:
    id: "new-session-create-button"

# Verify we navigate to a new session/chat view
- extendedWaitUntil:
    visible:
      id: "chat-screen"
    timeout: 10000

# Verify chat input is ready
- assertVisible:
    id: "session-message-input"

# Verify send button exists
- assertVisible:
    id: "session-send-button"

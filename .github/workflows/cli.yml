name: CLI CI

on:
  merge_group:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "apps/cli/**"
      - ".github/workflows/cli.yml"
  push:
    branches: [main]
    paths:
      - "apps/cli/**"
      - ".github/workflows/cli.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: apps/cli

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@735343b667d3e6a980af5e6a03acb6bd6a9e2a61 # v2.0.2

      - uses: pnpm/action-setup@fe02b34f77f8bc703c22d82ef19c587e31ddc8ee # v4.1.0

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@735343b667d3e6a980af5e6a03acb6bd6a9e2a61 # v2.0.2

      - uses: pnpm/action-setup@fe02b34f77f8bc703c22d82ef19c587e31ddc8ee # v4.1.0

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@735343b667d3e6a980af5e6a03acb6bd6a9e2a61 # v2.0.2

      - uses: pnpm/action-setup@fe02b34f77f8bc703c22d82ef19c587e31ddc8ee # v4.1.0

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

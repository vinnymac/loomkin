appId: com.loomkin.mobile
name: "Sessions: Open an existing session"
tags:
  - sessions

---
# Authenticate first
- runFlow: ../../utils/setup-auth.yaml

# Navigate to sessions tab
- tapOn:
    id: "tabs-sessions-button"

# Wait for sessions screen
- extendedWaitUntil:
    visible:
      id: "sessions-screen"
    timeout: 5000

# Wait for session cards to load, then tap the first one
- extendedWaitUntil:
    visible:
      id: "sessions-list-card-.*"
    timeout: 10000

- tapOn:
    id: "sessions-list-card-.*"
    index: 0

# Verify chat view loads
- extendedWaitUntil:
    visible:
      id: "chat-screen"
    timeout: 10000

# Verify chat input is available
- extendedWaitUntil:
    visible:
      id: "session-message-input"
    timeout: 5000

# Verify send button is available
- extendedWaitUntil:
    visible:
      id: "session-send-button"
    timeout: 3000
